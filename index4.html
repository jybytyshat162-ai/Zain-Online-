<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم الكاملة - زين أون لاين</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; padding: 20px; }
        .admin-box { background: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h3 { color: #FF6600; margin-bottom: 15px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; outline: none; }
        button { background: #FF6600; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }
        .chat-room-messages { height: 300px; overflow-y: auto; background: #efeae2; padding: 15px; border-radius: 10px; }
        .bubble { padding: 10px; margin-bottom: 10px; border-radius: 10px; max-width: 80%; }
        .bubble.admin { background: #d9fdd3; align-self: flex-end; }
        .bubble.client { background: white; align-self: flex-start; }
    </style>
</head>
<body>

<div class="admin-box">
    <h3>📢 إرسال إعلان/تحديث عام للعملاء</h3>
    <input type="text" id="updateTitle" placeholder="عنوان التحديث (مثل: خصومات جديدة!)">
    <textarea id="updateText" placeholder="اكتب تفاصيل التحديث هنا..."></textarea>
    <button id="sendUpdateBtn">نشر الإعلان لجميع العملاء</button>
</div>

<div class="admin-box">
    <h3>💬 محادثة العميل</h3>
    <div id="roomMessagesContainer" class="chat-room-messages"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyAUmiSv1NdOWCZhJCGab6in028MPhNjFgE",
    databaseURL: "https://zain-online-938c5-default-rtdb.firebaseio.com",
    projectId: "zain-online-938c5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// إرسال إشعار فقط
document.getElementById("sendUpdateBtn").addEventListener("click", async () => {

    const title = document.getElementById("updateTitle").value.trim();
    const text = document.getElementById("updateText").value.trim();

    if (!title || !text) {
        alert("يرجى تعبئة العنوان والرسالة!");
        return;
    }

    try {

        const notifRef = push(ref(db, "notifications"));

        await set(notifRef, {
            title: title,
            body: text,
            timestamp: Date.now(),
            read: false,
            icon: "notifications_active"
        });

        alert("✅ تم إرسال الإشعار بنجاح");

        document.getElementById("updateTitle").value = "";
        document.getElementById("updateText").value = "";

    } catch (error) {
        console.error(error);
        alert("❌ حدث خطأ أثناء الإرسال");
    }

});

// عرض المحادثة للإدارة
const urlParams = new URLSearchParams(window.location.search);
const currentUserId = urlParams.get("userId");
const roomMessagesContainer = document.getElementById("roomMessagesContainer");

if (currentUserId) {

    onValue(ref(db, `chats/${currentUserId}`), (snapshot) => {

        roomMessagesContainer.innerHTML = "";

        snapshot.forEach((child) => {

            const msg = child.val();

            const div = document.createElement("div");
            div.className = `bubble ${msg.sender === "admin" ? "admin" : "client"}`;
            div.innerText = msg.message;

            roomMessagesContainer.appendChild(div);

        });

    });

}
</script>
</body>
</html>
